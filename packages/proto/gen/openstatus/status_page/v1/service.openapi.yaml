components:
  schemas:
    openstatus.status_page.v1.OverallStatus:
      type: string
      title: OverallStatus
      enum:
        - OVERALL_STATUS_UNSPECIFIED
        - OVERALL_STATUS_OPERATIONAL
        - OVERALL_STATUS_DEGRADED
        - OVERALL_STATUS_PARTIAL_OUTAGE
        - OVERALL_STATUS_MAJOR_OUTAGE
        - OVERALL_STATUS_MAINTENANCE
        - OVERALL_STATUS_UNKNOWN
      description: OverallStatus represents the aggregated status of all components on a page.
    openstatus.status_page.v1.PageAccessType:
      type: string
      title: PageAccessType
      enum:
        - PAGE_ACCESS_TYPE_UNSPECIFIED
        - PAGE_ACCESS_TYPE_PUBLIC
        - PAGE_ACCESS_TYPE_PASSWORD_PROTECTED
        - PAGE_ACCESS_TYPE_AUTHENTICATED
      description: PageAccessType defines who can access the status page.
    openstatus.status_page.v1.PageComponentType:
      type: string
      title: PageComponentType
      enum:
        - PAGE_COMPONENT_TYPE_UNSPECIFIED
        - PAGE_COMPONENT_TYPE_MONITOR
        - PAGE_COMPONENT_TYPE_STATIC
      description: PageComponentType defines the type of a component on a status page.
    openstatus.status_page.v1.PageTheme:
      type: string
      title: PageTheme
      enum:
        - PAGE_THEME_UNSPECIFIED
        - PAGE_THEME_SYSTEM
        - PAGE_THEME_LIGHT
        - PAGE_THEME_DARK
      description: PageTheme defines the visual theme of the status page.
    openstatus.status_report.v1.StatusReportStatus:
      type: string
      title: StatusReportStatus
      enum:
        - STATUS_REPORT_STATUS_UNSPECIFIED
        - STATUS_REPORT_STATUS_INVESTIGATING
        - STATUS_REPORT_STATUS_IDENTIFIED
        - STATUS_REPORT_STATUS_MONITORING
        - STATUS_REPORT_STATUS_RESOLVED
      description: StatusReportStatus represents the current state of a status report.
    openstatus.maintenance.v1.MaintenanceSummary:
      type: object
      properties:
        id:
          type: string
          title: id
          description: Unique identifier for the maintenance.
        title:
          type: string
          title: title
          description: Title of the maintenance.
        message:
          type: string
          title: message
          description: Message describing the maintenance.
        from:
          type: string
          title: from
          description: Start time of the maintenance window (RFC 3339 format).
        to:
          type: string
          title: to
          description: End time of the maintenance window (RFC 3339 format).
        pageId:
          type: string
          title: page_id
          description: ID of the page this maintenance is associated with.
        pageComponentIds:
          type: array
          items:
            type: string
          title: page_component_ids
          description: IDs of affected page components.
        createdAt:
          type: string
          title: created_at
          description: Timestamp when the maintenance was created (RFC 3339 format).
        updatedAt:
          type: string
          title: updated_at
          description: Timestamp when the maintenance was last updated (RFC 3339 format).
      title: MaintenanceSummary
      additionalProperties: false
      description: MaintenanceSummary represents metadata for a maintenance window (used in list responses).
    openstatus.status_page.v1.AddMonitorComponentRequest:
      type: object
      properties:
        pageId:
          type: string
          title: page_id
          minLength: 1
          description: ID of the status page to add the component to (required).
        monitorId:
          type: string
          title: monitor_id
          minLength: 1
          description: ID of the monitor to associate with this component (required).
        name:
          type: string
          title: name
          maxLength: 256
          description: Display name for the component (optional, defaults to monitor name).
          nullable: true
        description:
          type: string
          title: description
          maxLength: 1024
          description: Description of the component (optional).
          nullable: true
        order:
          type: integer
          title: order
          format: int32
          description: Display order of the component (optional).
          nullable: true
        groupId:
          type: string
          title: group_id
          description: ID of the group to add this component to (optional).
          nullable: true
      title: AddMonitorComponentRequest
      additionalProperties: false
    openstatus.status_page.v1.AddMonitorComponentResponse:
      type: object
      properties:
        component:
          title: component
          description: The created component.
          $ref: '#/components/schemas/openstatus.status_page.v1.PageComponent'
      title: AddMonitorComponentResponse
      additionalProperties: false
    openstatus.status_page.v1.AddStaticComponentRequest:
      type: object
      properties:
        pageId:
          type: string
          title: page_id
          minLength: 1
          description: ID of the status page to add the component to (required).
        name:
          type: string
          title: name
          maxLength: 256
          minLength: 1
          description: Display name for the component (required).
        description:
          type: string
          title: description
          maxLength: 1024
          description: Description of the component (optional).
          nullable: true
        order:
          type: integer
          title: order
          format: int32
          description: Display order of the component (optional).
          nullable: true
        groupId:
          type: string
          title: group_id
          description: ID of the group to add this component to (optional).
          nullable: true
      title: AddStaticComponentRequest
      additionalProperties: false
    openstatus.status_page.v1.AddStaticComponentResponse:
      type: object
      properties:
        component:
          title: component
          description: The created component.
          $ref: '#/components/schemas/openstatus.status_page.v1.PageComponent'
      title: AddStaticComponentResponse
      additionalProperties: false
    openstatus.status_page.v1.ComponentStatus:
      type: object
      properties:
        componentId:
          type: string
          title: component_id
          description: ID of the component.
        status:
          title: status
          description: Current status of the component.
          $ref: '#/components/schemas/openstatus.status_page.v1.OverallStatus'
      title: ComponentStatus
      additionalProperties: false
      description: ComponentStatus represents the status of a single component.
    openstatus.status_page.v1.CreateComponentGroupRequest:
      type: object
      properties:
        pageId:
          type: string
          title: page_id
          minLength: 1
          description: ID of the status page to create the group in (required).
        name:
          type: string
          title: name
          maxLength: 256
          minLength: 1
          description: Display name for the group (required).
      title: CreateComponentGroupRequest
      additionalProperties: false
    openstatus.status_page.v1.CreateComponentGroupResponse:
      type: object
      properties:
        group:
          title: group
          description: The created component group.
          $ref: '#/components/schemas/openstatus.status_page.v1.PageComponentGroup'
      title: CreateComponentGroupResponse
      additionalProperties: false
    openstatus.status_page.v1.CreateStatusPageRequest:
      type: object
      properties:
        title:
          type: string
          title: title
          maxLength: 256
          minLength: 1
          description: Title of the status page (required).
        description:
          type: string
          title: description
          maxLength: 1024
          description: Description of the status page (optional).
          nullable: true
        slug:
          type: string
          title: slug
          maxLength: 256
