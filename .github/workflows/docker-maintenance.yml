name: Docker Maintenance

on:
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      action:
        description: 'Maintenance action'
        required: true
        default: 'rebuild'
        type: choice
        options:
          - rebuild
          - cleanup
          - security-scan

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openstatus

jobs:
  rebuild-base-images:
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'rebuild' || github.event.inputs.action == ''
    permissions:
      contents: read
      id-token: write
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild all images
        run: |
          echo "Triggering rebuild of all Docker images..."
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"rebuild_all_images"}'

  cleanup-old-images:
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'cleanup'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete old package versions
        run: |
          # Delete old image versions (keep last 10)
          echo "Cleaning up old image versions..."
          # This would require GitHub CLI or API calls to delete old package versions
          # For now, just log the action
          echo "Cleanup action triggered - manual cleanup may be required"

  security-scan:
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'security-scan'
    permissions:
      contents: read
      packages: read
    
    strategy:
      matrix:
        service: [server, dashboard, workflows, private-location, status-page, checker]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:latest
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'
