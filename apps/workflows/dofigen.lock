      - target: packages/regions/package.json
        source: packages/regions/package.json
      - target: packages/services/package.json
        source: packages/services/package.json
      - target: packages/subscriptions/package.json
        source: packages/subscriptions/package.json
      - target: packages/utils/package.json
        source: packages/utils/package.json
