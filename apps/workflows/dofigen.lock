effective: |
  ignore:
  - node_modules
  - /apps/docs
  - /apps/screenshot-service
  - /apps/server
  - /apps/web
  - /apps/dashboard
  - /apps/status-page
  - /packages/analytics
  - /packages/api
  - /packages/error
  - /packages/tracker
  builders:
    install:
      fromImage:
        path: node
        digest: sha256:b31e7a42fdf8b8aa5f5ed477c72d694301273f1069c5a2f71d53c6482e99a2fc
      label:
        org.opencontainers.image.stage: install
        org.opencontainers.image.base.digest: sha256:b31e7a42fdf8b8aa5f5ed477c72d694301273f1069c5a2f71d53c6482e99a2fc
        org.opencontainers.image.base.name: docker.io/node:24-slim
      workdir: /app/
      run:
      - corepack enable pnpm
      - pnpm install --prod --frozen-lockfile --filter=@openstatus/workflows... --verbose
      cache:
      - target: /root/.local/share/pnpm/store
      bind:
      - target: pnpm-workspace.yaml
        source: pnpm-workspace.yaml
      - target: pnpm-lock.yaml
        source: pnpm-lock.yaml
      - target: package.json
        source: package.json
      - target: apps/workflows/package.json
        source: apps/workflows/package.json
      - target: packages/assertions/package.json
        source: packages/assertions/package.json
      - target: packages/db/package.json
        source: packages/db/package.json
      - target: packages/emails/package.json
        source: packages/emails/package.json
      - target: packages/notifications/base/package.json
        source: packages/notifications/base/package.json
      - target: packages/notifications/discord/package.json
        source: packages/notifications/discord/package.json
      - target: packages/notifications/email/package.json
        source: packages/notifications/email/package.json
      - target: packages/notifications/grafana-oncall/package.json
        source: packages/notifications/grafana-oncall/package.json
      - target: packages/notifications/google-chat/package.json
        source: packages/notifications/google-chat/package.json
      - target: packages/notifications/ms-teams/package.json
        source: packages/notifications/ms-teams/package.json
      - target: packages/notifications/ntfy/package.json
        source: packages/notifications/ntfy/package.json
      - target: packages/notifications/opsgenie/package.json
        source: packages/notifications/opsgenie/package.json
      - target: packages/notifications/pagerduty/package.json
        source: packages/notifications/pagerduty/package.json
      - target: packages/notifications/slack/package.json
        source: packages/notifications/slack/package.json
      - target: packages/notifications/telegram/package.json
        source: packages/notifications/telegram/package.json
      - target: packages/notifications/bird-whatsapp/package.json
        source: packages/notifications/bird-whatsapp/package.json
      - target: packages/notifications/twillio-sms/package.json
        source: packages/notifications/twillio-sms/package.json
      - target: packages/notifications/webhook/package.json
        source: packages/notifications/webhook/package.json
      - target: packages/importers/package.json
        source: packages/importers/package.json
      - target: packages/regions/package.json
        source: packages/regions/package.json
      - target: packages/services/package.json
        source: packages/services/package.json
      - target: packages/subscriptions/package.json
        source: packages/subscriptions/package.json
      - target: packages/utils/package.json
        source: packages/utils/package.json
      - target: packages/tsconfig/package.json
        source: packages/tsconfig/package.json
      - target: packages/tinybird/package.json
        source: packages/tinybird/package.json
      - target: packages/upstash/package.json
        source: packages/upstash/package.json
      - target: packages/theme-store/package.json
        source: packages/theme-store/package.json
      - target: packages/locales/package.json
        source: packages/locales/package.json
      - target: packages/status-fetcher/package.json
        source: packages/status-fetcher/package.json
    build:
      fromImage:
        path: denoland/deno
        digest: sha256:8d24854de78a79c56e74b49aa4c5996c60e1fe3730efba8fbdd2692c582e6e29
      label:
        org.opencontainers.image.base.name: docker.io/denoland/deno:2.9.0
        org.opencontainers.image.base.digest: sha256:8d24854de78a79c56e74b49aa4c5996c60e1fe3730efba8fbdd2692c582e6e29
        org.opencontainers.image.stage: build
      workdir: /app/apps/workflows
      env:
        NODE_ENV: production
      copy:
      - paths:
        - .
        target: /app/
      - fromBuilder: install
        paths:
        - /app/node_modules
        target: /app/node_modules
      - fromBuilder: install
        paths:
        - /app/apps/workflows/node_modules
        target: /app/apps/workflows/node_modules
      - fromBuilder: install
        paths:
        - /app/packages
        target: /app/packages
      run:
      - mkdir -p /tmp/sc
      - deno eval 'const p="/app/node_modules/.pnpm";const v=(x)=>{for(const e of Deno.readDirSync(p))if(e.name.startsWith(x+"@"))return e.name.slice(x.length+1).split("_")[0]};const lib=v("libsql");Deno.writeTextFileSync("/tmp/sc/package.json",JSON.stringify({dependencies:{"@libsql/client":v("@libsql+client"),libsql:lib,"better-sqlite3":"npm:libsql@"+lib,"@google-cloud/tasks":v("@google-cloud+tasks")}}))'
      - cd /tmp/sc && deno install --node-modules-dir=auto --allow-scripts
      - cd /app/apps/workflows && deno bundle --platform=deno --minify --sloppy-imports --node-modules-dir=manual --external '@libsql/client' --external 'libsql' --external 'better-sqlite3' --external '@google-cloud/tasks' --output /tmp/sc/_serve.bundle.mjs src/serve.ts
      - cd /tmp/sc && deno compile --no-check -A --node-modules-dir=manual --output /app/apps/workflows/app /tmp/sc/_serve.bundle.mjs
      - mkdir -p /app/data
  fromImage:
    host: registry.access.redhat.com
    port: 443
    path: hi/curl
    digest: sha256:848b81ab5d5e55371d7193fd4f1ea7b605d14dbb039344ffad34a4c1f0d880f4
  label:
    org.opencontainers.image.base.digest: sha256:848b81ab5d5e55371d7193fd4f1ea7b605d14dbb039344ffad34a4c1f0d880f4
    io.dofigen.version: 2.8.0
    org.opencontainers.image.source: https://github.com/openstatusHQ/openstatus
    org.opencontainers.image.title: OpenStatus Workflows
    org.opencontainers.image.authors: OpenStatus Team
    org.opencontainers.image.vendor: OpenStatus
    org.opencontainers.image.description: Background job processing and probe scheduling for OpenStatus
  user:
    user: '1000'
    group: '1000'
  workdir: /app/
  copy:
  - fromBuilder: build
    paths:
    - /app/apps/workflows/app
    target: /app/apps/workflows/
    chmod: '555'
  - fromBuilder: build
    paths:
    - /app/data
    target: /app/data
  entrypoint:
  - /app/apps/workflows/app
  expose:
  - port: 3000
  healthcheck:
    cmd: '["curl", "-f", "http://localhost:3000/ping"]'
    interval: 1m
    timeout: 10s
    start: 30s
    retries: 3
images:
  docker.io:
    denoland:
      deno:
        2.9.0:
          digest: sha256:8d24854de78a79c56e74b49aa4c5996c60e1fe3730efba8fbdd2692c582e6e29
    library:
      node:
        24-slim:
          digest: sha256:b31e7a42fdf8b8aa5f5ed477c72d694301273f1069c5a2f71d53c6482e99a2fc
resources:
  dofigen.yml:
    hash: f867c1863629aad9394b8d9a4cec2bdd234fcd09663a01f5c401bd39ce5b53c2
    content: |
      ignore:
        - node_modules
        - /apps/docs
        - /apps/screenshot-service
        - /apps/server
        - /apps/web
        - /apps/dashboard
        - /apps/status-page
        - /packages/analytics
        - /packages/api
        - /packages/error
        - /packages/tracker
      builders:
        install:
          fromImage: node:24-slim
          workdir: /app/
          labels:
            org.opencontainers.image.stage: install
          bind:
            - pnpm-workspace.yaml
            - pnpm-lock.yaml
            - package.json
            - apps/workflows/package.json
            - packages/assertions/package.json
            - packages/db/package.json
            - packages/emails/package.json
            - packages/notifications/base/package.json
            - packages/notifications/discord/package.json
            - packages/notifications/email/package.json
            - packages/notifications/grafana-oncall/package.json
            - packages/notifications/google-chat/package.json
            - packages/notifications/ms-teams/package.json
            - packages/notifications/ntfy/package.json
            - packages/notifications/opsgenie/package.json
            - packages/notifications/pagerduty/package.json
            - packages/notifications/slack/package.json
            - packages/notifications/telegram/package.json
            - packages/notifications/bird-whatsapp/package.json
            - packages/notifications/twillio-sms/package.json
            - packages/notifications/webhook/package.json
            - packages/importers/package.json
            - packages/regions/package.json
            - packages/services/package.json
            - packages/subscriptions/package.json
            - packages/utils/package.json
            - packages/tsconfig/package.json
            - packages/tinybird/package.json
            - packages/upstash/package.json
            - packages/theme-store/package.json
            - packages/locales/package.json
            - packages/status-fetcher/package.json

          # Install dependencies (scoped to the workflows subgraph so node_modules — and the binary that embeds it — stays small)
          run:
            - corepack enable pnpm
            - pnpm install --prod --frozen-lockfile --filter=@openstatus/workflows... --verbose
          cache:
            - /root/.local/share/pnpm/store

        # Stage 4: Build application (compile to binary with Deno)
        build:
          fromImage: denoland/deno:2.9.0
          workdir: /app/apps/workflows
          labels:
            org.opencontainers.image.stage: build
          copy:
            - . /app/
            - fromBuilder: install
              source: /app/node_modules
              target: /app/node_modules
            - fromBuilder: install
              source: /app/apps/workflows/node_modules
              target: /app/apps/workflows/node_modules
            - fromBuilder: install
              source: /app/packages
              target: /app/packages
          env:
            NODE_ENV: production
          # Bundle the app to self-contained JS, EXTERNALISING the packages that can't be inlined:
          # @libsql/client + libsql + better-sqlite3 (alias of libsql, native .node loader) and
          # @google-cloud/tasks (google-proto-files reads files via CJS __dirname). They ship as a
          # minimal side-car node_modules (deno install, platform-aware so Fly amd64 works) instead
          # of embedding all node_modules. better-sqlite3 is the name drizzle-orm/better-sqlite3
          # requires; it's aliased to libsql so both resolve to the same native package.
          run:
            - mkdir -p /tmp/sc
            - deno eval 'const p="/app/node_modules/.pnpm";const v=(x)=>{for(const e of Deno.readDirSync(p))if(e.name.startsWith(x+"@"))return e.name.slice(x.length+1).split("_")[0]};const lib=v("libsql");Deno.writeTextFileSync("/tmp/sc/package.json",JSON.stringify({dependencies:{"@libsql/client":v("@libsql+client"),libsql:lib,"better-sqlite3":"npm:libsql@"+lib,"@google-cloud/tasks":v("@google-cloud+tasks")}}))'
            - cd /tmp/sc && deno install --node-modules-dir=auto --allow-scripts
            - cd /app/apps/workflows && deno bundle --platform=deno --minify --sloppy-imports --node-modules-dir=manual --external '@libsql/client' --external 'libsql' --external 'better-sqlite3' --external '@google-cloud/tasks' --output /tmp/sc/_serve.bundle.mjs src/serve.ts
            - cd /tmp/sc && deno compile --no-check -A --node-modules-dir=manual --output /app/apps/workflows/app /tmp/sc/_serve.bundle.mjs
            - mkdir -p /app/data

      # Runtime: distroless glibc base that already ships curl + CA certs (Deno's HTTPS works on it; no apt needed).
      # Pinned to the multi-arch index digest of hi/curl:latest — dofigen mis-resolves this registry's tag to an unpullable digest.
      fromImage: registry.access.redhat.com/hi/curl@sha256:848b81ab5d5e55371d7193fd4f1ea7b605d14dbb039344ffad34a4c1f0d880f4
      workdir: /app/

      # Metadata labels
      labels:
        org.opencontainers.image.title: OpenStatus Workflows
        org.opencontainers.image.description: Background job processing and probe scheduling for OpenStatus
        org.opencontainers.image.source: https://github.com/openstatusHQ/openstatus
        org.opencontainers.image.vendor: OpenStatus
        org.opencontainers.image.authors: OpenStatus Team

      # Copy the self-contained compiled binary (native addon embedded by deno compile)
      copy:
        - fromBuilder: build
          source: /app/apps/workflows/app
          target: /app/apps/workflows/
          chmod: "555"
        - fromBuilder: build
          source: /app/data
          target: /app/data

      user: "1000:1000"
      expose: "3000"

      # Health check — exec form (JSON array) because the base has no shell for CMD-SHELL
      healthcheck:
        interval: 1m
        timeout: 10s
        start: 30s
        retries: 3
        cmd: '["curl", "-f", "http://localhost:3000/ping"]'

      entrypoint: /app/apps/workflows/app
