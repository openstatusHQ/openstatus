      - target: packages/notifications/telegram/package.json
        source: packages/notifications/telegram/package.json
      - target: packages/notifications/bird-whatsapp/package.json
        source: packages/notifications/bird-whatsapp/package.json
      - target: packages/notifications/twillio-sms/package.json
        source: packages/notifications/twillio-sms/package.json
      - target: packages/notifications/webhook/package.json
        source: packages/notifications/webhook/package.json
      - target: packages/importers/package.json
